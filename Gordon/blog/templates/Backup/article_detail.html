{% extends 'blog/base.html' %}
{% block title %}{{ article.title }}{% endblock %}
{% block content %}
    <h1>{{ article.title }}</h1>
    {% if article.date %}
        <p class="meta">{{ article.date|date:"F Y" }}</p>  <!-- e.g. "March 2019" -->
    {% endif %}
    <div class="article-body">
        {{ article.body|linebreaks }}
    </div>
    <br>
    <a href="{% url 'articles' %}">← Back to Articles</a>
{% endblock %}
