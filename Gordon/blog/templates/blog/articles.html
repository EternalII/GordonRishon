{% extends 'blog/base.html' %}
{% block title %}My Articles{% endblock %}
{% block content %}
    <h1>My Articles</h1>
    {% for article in articles %}
        <div class="card">
            <a href="{% url 'article_detail' article.pk %}"><strong>{{ article.title }}</strong></a>
            <p class="meta">{{ article.created_at|date:"F j, Y" }}</p>
        </div>
    {% empty %}
        <p>No articles yet.</p>
    {% endfor %}
{% endblock %}
