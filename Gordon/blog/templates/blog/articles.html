{% extends 'blog/base.html' %}
{% block title %}My Articles{% endblock %}
{% block content %}
    <h1>My Articles</h1>
    {% for article in articles %}
        <div class="card">
            <a href="{% url 'article_detail' article.pk %}"><strong>{{ article.title }}</strong></a>
            {% if article.date %}
                <p class="meta">{{ article.date|date:"F Y" }}</p>  <!-- e.g. "March 2019" -->
            {% endif %}
        </div>
    {% empty %}
        <p>No articles yet.</p>
    {% endfor %}
{% endblock %}
