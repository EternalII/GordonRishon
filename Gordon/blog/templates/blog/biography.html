{% extends 'blog/base.html' %}
{% block title %}Biography{% endblock %}
{% block content %}
    <h1>Biography</h1>
    {% if bio %}
        {% if bio.image %}
            <img src="{{ bio.image.url }}" alt="Biography Image">
                {% if bio.image_caption %}
                    <p>{{ bio.image_caption }}</p>
                {% endif %}
        {% endif %}
        <div>{{ bio.content|safe }}</div>
    {% else %}
        <p>Biography coming soon.</p>
    {% endif %}
{% endblock %}
