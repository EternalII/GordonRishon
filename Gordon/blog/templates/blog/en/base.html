{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gordon Rishon{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="site-title">Gordon Rishon</div>
            <div class="site-subtitle">Zinovy Gordon</div>
        </header>
        <nav>
            <div class="nav-links">
                <a href="{% url 'home_en' %}">Home</a>
                <a href="{% url 'biography_en' %}">Biography</a>
                <a href="{% url 'articles_en' %}">My Articles</a>
                <a href="{% url 'interesting_reads_en' %}">Interesting Reads</a>
                <a href="{% url 'family_tree_en' %}">Family Tree</a>
            </div>
            <div class="lang-toggle">
                <a href="#">EN</a>
                <span class="separator">|</span>
                <a href="{{ lang_switch_url }}">RU</a>
            </div>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            © Zinovy Gordon
        </footer>
    </div>
</body>
</html>
