{% extends 'blog/en/base.html' %}
{% load static %}
{% block title %}Family Tree{% endblock %}
{% block content %}
    <h1 class="page-title">Family Tree</h1>

    <div class="tree-grid">
        <a href="{% url 'family_tree_detail_en' 'core' %}" class="tree-card">
            <div class="tree-card-image">
                <div class="loading-spinner"></div>
                <img src="{% static 'images/family_tree.jpg' %}" alt="Core Family Tree" onload="this.classList.add('loaded');">
            </div>
            <div class="tree-card-title">Core Family Tree</div>
        </a>

        <a href="{% url 'family_tree_detail_en' 'extended' %}" class="tree-card">
            <div class="tree-card-image">
                <picture>
                    <source media="(max-width: 768px)" srcset="{% static 'images/family_tree_extended_low.jpg' %}">
                    <source media="(max-width: 1200px)" srcset="{% static 'images/family_tree_extended_medium.jpg' %}">
                    <img src="{% static 'images/family_tree_extended_high.jpg' %}" alt="Extended Family Tree" onload="this.classList.add('loaded'); this.previousElementSibling.parentElement.previousElementSibling.style.display='none';">
                </picture>
            </div>
            <div class="tree-card-title">Extended Family Tree.</br>Tree by Dimitri Olidort</div>
        </a>
    </div>
{% endblock %}
