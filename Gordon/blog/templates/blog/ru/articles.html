{% extends 'blog/ru/base.html' %}
{% block title %}Мои статьи{% endblock %}
{% block content %}
    <h1>Мои статьи</h1>
    {% for article in articles %}
        <div class="card">
            <a href="{% url 'article_detail_ru' article.pk %}"><strong>{{ article.title_ru }}</strong></a>
            {% if article.date %}<p class="meta">{{ article.date|date:"F Y" }}</p>{% endif %}
        </div>
    {% empty %}
        <p>Статьи отсутствуют.</p>
    {% endfor %}
{% endblock %}
