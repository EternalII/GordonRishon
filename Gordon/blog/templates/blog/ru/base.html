{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Гордон Ришон{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="site-title">Гордон Ришон</div>
            <div class="site-subtitle">Зиновий Гордон</div>
        </header>
        <nav>
            <div class="nav-links">
                <a href="{% url 'home_ru' %}">Главная</a>
                <a href="{% url 'biography_ru' %}">Биография</a>
                <a href="{% url 'articles_ru' %}">Мои статьи</a>
                <a href="{% url 'interesting_reads_ru' %}">Интересное</a>
            </div>
            <div class="lang-toggle">
                <a href="{{ lang_switch_url }}">EN</a>
                <span class="separator">|</span>
                <a href="#">RU</a>
            </div>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            © Зиновий Гордон
        </footer>
    </div>
</body>
</html>
